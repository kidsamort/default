events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream promo_server {
        server promo:3000;
    }

    upstream client_server {
        server client:3000;
    }

    upstream api_server {
        server server:3001;
    }

    upstream s3_server {
        server minio:9000;
    }

    # Global proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. API Gateway (shared or at api.localhost)
    server {
        listen 80;
        server_name api.localhost;

        location / {
            proxy_pass http://api_server;
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # 2. S3 Assets Console (at s3.localhost)
    server {
        listen 80;
        server_name s3.localhost;

        location / {
            proxy_pass http://s3_server;
        }
    }

    # 3. Game Client (at play.localhost)
    server {
        listen 80;
        server_name play.localhost;

        location / {
            proxy_pass http://client_server;
        }
    }

    # 4. Promo/Landing Website (at localhost / main domain)
    server {
        listen 80;
        server_name localhost;

        # API routing fallback for same-origin api requests
        location /api {
            proxy_pass http://api_server;
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # MinIO S3 assets route fallback
        location /s3/ {
            proxy_pass http://s3_server/;
        }

        # Main website
        location / {
            proxy_pass http://promo_server;
        }
    }
}
